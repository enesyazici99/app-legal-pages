<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony - Legal Pages</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            color: #3C3438;
            background: linear-gradient(135deg, #B49890 0%, #8B7068 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: #FAF7F0;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(60, 52, 56, 0.25);
        }
        h1 {
            color: #3C3438;
            margin-bottom: 10px;
            font-family: Georgia, serif;
            font-weight: 500;
            font-size: 2em;
        }
        .subtitle {
            color: #8A7E83;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .links a {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: #ffffff;
            border-radius: 10px;
            text-decoration: none;
            color: #3C3438;
            font-weight: 500;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .links a:hover {
            border-color: #B49890;
            background: #F5EFE7;
        }
        .links a .icon {
            font-size: 1.3em;
            margin-right: 15px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.95);
            text-decoration: none;
        }
        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Harmony</h1>
            <p class="subtitle">Color Analysis AI</p>
            <div class="links">
                <a href="privacy-policy.html">
                    <span class="icon">&#x1F512;</span>
                    Privacy Policy
                </a>
                <a href="terms-of-service.html">
                    <span class="icon">&#x1F4DC;</span>
                    Terms of Service
                </a>
                <a href="support.html">
                    <span class="icon">&#x1F4AC;</span>
                    Support
                </a>
            </div>
        </div>
        <a href="../index.html" class="back-link">&larr; Back to All Apps</a>
    </div>
</body>
</html>
